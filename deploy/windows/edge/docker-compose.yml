# KIG7 LAN edge: Host-based reverse proxy on port 80 + local DNS resolver.
#
# This is a SEPARATE compose project (kig7-edge) from kig7-live / kig7-staging.
# It only ADDS:
#   - edge   : nginx on host :80, routes specialtask.com -> live (8074),
#              test.specialtask.com -> staging (8073) via host.docker.internal.
#   - dns    : dnsmasq answering specialtask.com / www / test -> the LAN IP.
#
# The existing live (8074) and staging (8073) stacks are NOT modified.
#
# Bring up:   docker compose -p kig7-edge -f deploy/windows/edge/docker-compose.yml up -d
# Tear down:  docker compose -p kig7-edge -f deploy/windows/edge/docker-compose.yml down

services:
  edge:
    image: nginx:1.27-alpine
    container_name: kig7-edge-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    extra_hosts:
      # Lets the container reach the host's published 8073/8074 ports.
      - "host.docker.internal:host-gateway"
    volumes:
      - ./nginx-edge.conf:/etc/nginx/conf.d/default.conf:ro
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M

  dns:
    image: 4km3/dnsmasq:2.90-r3
    container_name: kig7-edge-dns
    restart: unless-stopped
    # Bind DNS to the host's LAN IP only (ICS already holds 0.0.0.0:53).
    # ${EDGE_LAN_IP} comes from deploy/windows/edge/edge.env
    ports:
      - "${EDGE_LAN_IP}:53:53/udp"
      - "${EDGE_LAN_IP}:53:53/tcp"
    command:
      - "--keep-in-foreground"
      - "--log-facility=-"
      - "--no-resolv"
      - "--no-hosts"
      # Upstream resolver for everything that is NOT specialtask.com.
      - "--server=1.1.1.1"
      - "--server=8.8.8.8"
      # Map our hostnames to the LAN IP. address=/host/IP also covers subdomains.
      - "--address=/specialtask.com/${EDGE_LAN_IP}"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
