# KIG7 LAN edge reverse proxy (host port 80).
# Routes by Host header to the already-published per-stack proxies on the host:
#   specialtask.com / www.specialtask.com  -> LIVE    (host.docker.internal:8074)
#   test.specialtask.com                    -> STAGING (host.docker.internal:8073)
#
# This container ONLY adds Host-based routing on port 80. The existing
# kig7-live (8074) and kig7-staging (8073) stacks are untouched.
#
# host.docker.internal:host-gateway is injected via docker-compose extra_hosts
# so this container can reach the host's published ports from inside Docker.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Upstream = the host's published per-stack proxy ports.
upstream kig7_live {
    server host.docker.internal:8074;
}
upstream kig7_test {
    server host.docker.internal:8073;
}

# Shared proxy behaviour for an Odoo backend.
# Usage: include via the per-server blocks below.

# ---- LIVE: specialtask.com / www.specialtask.com -------------------------
server {
    listen 80;
    server_name specialtask.com www.specialtask.com;

    proxy_read_timeout 7200s;
    proxy_send_timeout 7200s;
    client_max_body_size 200m;

    # Proof-of-routing marker (lets you confirm which backend served a request).
    add_header X-KIG7-Backend "live" always;

    location /websocket {
        proxy_pass http://kig7_live;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location /longpolling/ {
        proxy_pass http://kig7_live;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://kig7_live;
        proxy_redirect off;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---- STAGING/TEST: test.specialtask.com ----------------------------------
server {
    listen 80;
    server_name test.specialtask.com;

    proxy_read_timeout 7200s;
    proxy_send_timeout 7200s;
    client_max_body_size 200m;

    # Proof-of-routing marker.
    add_header X-KIG7-Backend "test" always;

    location /websocket {
        proxy_pass http://kig7_test;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location /longpolling/ {
        proxy_pass http://kig7_test;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://kig7_test;
        proxy_redirect off;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---- Default / unknown Host: send to LIVE so a bare IP still works -------
server {
    listen 80 default_server;
    server_name _;

    proxy_read_timeout 7200s;
    proxy_send_timeout 7200s;
    client_max_body_size 200m;

    add_header X-KIG7-Backend "live-default" always;

    location /websocket {
        proxy_pass http://kig7_live;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location / {
        proxy_pass http://kig7_live;
        proxy_redirect off;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
