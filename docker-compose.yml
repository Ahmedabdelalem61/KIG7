# Odoo 18 Community + Postgres for KIG7 staging (HrProject addons).
# See deploy/README.md for backup restore and VPS layout.

services:
  db:
    image: postgres:16
    restart: unless-stopped
    # Default 64MiB shm caps Postgres; raise for shared_buffers / parallel temp.
    shm_size: "2gb"
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-odoo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-odoo}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    image: kig7-odoo18-web:18.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    shm_size: "512mb"
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    ports:
      - "${ODOO_PUBLISH_PORT:-8073}:8069"
    volumes:
      - odoo-data:/var/lib/odoo
      - ./HrProject:/mnt/kig7-addons:ro
      - ./configs/docker.odoo.conf:/etc/odoo/odoo.conf:ro
    # Odoo reads DB settings from /etc/odoo/odoo.conf (mounted above).

volumes:
  pgdata:
  odoo-data:
