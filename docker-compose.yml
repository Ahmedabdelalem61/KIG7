# Odoo 18 Community + Postgres for KIG7 staging (HrProject addons).
# See deploy/README.md for backup restore and VPS layout.

services:
  db:
    image: postgres:16
    restart: unless-stopped
    # ~3x prior headroom: parallel workers + shared memory for Postgres temp.
    shm_size: "6gb"
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    # Tuned for ~8 vCPU / shared host with Odoo (raise shared_buffers if you add RAM).
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=2GB
      -c effective_cache_size=8GB
      -c maintenance_work_mem=512MB
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c max_worker_processes=8
      -c max_parallel_workers_per_gather=4
      -c max_parallel_workers=8
      -c min_wal_size=512MB
      -c max_wal_size=2GB
      -c wal_buffers=64MB
      -c default_statistics_target=100
    deploy:
      resources:
        limits:
          cpus: "3.0"
          memory: 10G
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-odoo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-odoo}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    image: kig7-odoo18-web:18.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    # Larger shm for worker temp / report rendering.
    shm_size: "1536mb"
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    expose:
      - "8069"
      - "8072"
    deploy:
      resources:
        limits:
          cpus: "6.0"
          memory: 14G
    volumes:
      - odoo-data:/var/lib/odoo
      - ./HrProject:/mnt/kig7-addons:ro
      - ./configs/docker.odoo.conf:/etc/odoo/odoo.conf:ro
    # Odoo reads DB settings from /etc/odoo/odoo.conf (mounted above).

  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "${ODOO_PUBLISH_PORT:-8073}:80"
    volumes:
      - ./deploy/nginx-odoo.conf:/etc/nginx/conf.d/default.conf:ro
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M

volumes:
  pgdata:
  odoo-data:
