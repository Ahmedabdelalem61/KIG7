[options]
; Paths inside the official odoo:18.0 image + bind-mounted HrProject (see docker-compose.yml)
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/kig7-addons,/mnt/kig7-addons/thirdparty,/mnt/kig7-addons/thirdparty/design-themes

data_dir = /var/lib/odoo

; PostgreSQL service name from docker-compose.yml
db_host = db
db_port = 5432
db_user = odoo
db_password = f4f82cffd62ef5dbf98723a56d83ca8ef5f8cceb
db_name = 18c_hr_project_test

; Master password (database manager). For a public clone, set your real value only on the server.
admin_passwd = admin_1

http_port = 8069
gevent_port = 8072
without_demo = all

; Multi-worker throughput (~3x vs workers=0). Requires `proxy` nginx routing /websocket to 8072.
workers = 8
max_cron_threads = 2
limit_time_cpu = 600
limit_time_real = 1200
limit_memory_soft = 2147483648
limit_memory_hard = 2684354560
